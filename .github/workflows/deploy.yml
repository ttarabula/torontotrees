name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Monthly rebuild on the 1st — Toronto's upstream dataset refreshes
    # "as available" (often quarterly or longer), so monthly is plenty.
    - cron: "17 5 1 * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen

      - name: Fetch raw data (trees + neighbourhoods + census)
        run: uv run scripts/fetch.py

      - name: Build processed parquets (spatial join + clean)
        run: uv run scripts/build.py

      - name: Export per-street JSON for the site
        run: uv run scripts/export_site.py

      - name: Export per-species JSON for the site
        run: uv run scripts/export_species.py

      - name: Export grid cells for "near me" search
        run: uv run scripts/export_grid.py

      - name: Generate per-neighbourhood hero maps
        run: uv run scripts/nbhd_maps.py

      - name: Generate per-neighbourhood HTML pages
        run: uv run scripts/generate_neighbourhoods.py

      - name: Generate canopy-timeline binary
        run: uv run scripts/timeline_data.py

      - name: Generate data lenses
        run: uv run scripts/lenses.py

      - name: Generate per-species pages and OG cards
        run: uv run scripts/species_pages.py

      - name: Generate narrow-street-advantage blog hero chart
        run: uv run scripts/narrow_street_chart.py

      - name: Generate blog RSS feed
        run: uv run scripts/rss.py

      - name: Generate calendar iCal feeds
        run: uv run scripts/calendar_feeds.py

      - name: Fetch upstream CKAN freshness metadata
        run: uv run scripts/freshness.py

      - name: Generate sitemap.xml (last step — covers all emitted pages)
        run: uv run scripts/sitemap.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
