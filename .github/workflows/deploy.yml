name: Build and deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly rebuild — catches city-side data refreshes
    - cron: "17 5 * * 1"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install Python deps
        run: uv sync --frozen

      - name: Fetch raw data (trees + neighbourhoods + census)
        run: uv run scripts/fetch.py

      - name: Build processed parquets (spatial join + clean)
        run: uv run scripts/build.py

      - name: Export per-street JSON for the site
        run: uv run scripts/export_site.py

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
